name: CI

# Markdown-only changes (README and friends) skip the pipeline entirely:
# GitHub only starts the workflow if at least one changed file falls
# outside `paths-ignore`. Finer-grained skipping (backend-only vs
# frontend-only) is handled per job by paths-filter below.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # Each job below runs its own `dorny/paths-filter` step rather than
  # sharing one upstream "changes" job, because jobs no longer skip
  # wholesale - only individual steps do, gated on that job's own filter
  # output. That keeps `needs:` a plain dependency chain (no more
  # `always() && result == 'skipped'` juggling to shepherd a skipped job's
  # status through downstream `needs`), while e.g. a frontend-only PR
  # still skips the backend steps in every stage (Markdown-only changes
  # never even start the workflow - see `paths-ignore` above). Any change under
  # `.github/workflows/**` forces every gated step to run (so a
  # pipeline-editing PR is fully validated before merge), and **pushes to
  # `main` always run every step** (see each step's
  # `|| github.event_name == 'push'` escape), so `main` never merges on a
  # partially-validated pipeline.
  quality-backend:
    name: Code Quality (Backend)
    runs-on: ubuntu-latest
    steps:
      # paths-filter resolves the diff via local git on push events (the
      # checkout-free API mode only works for pull_request), so it needs
      # the repository checked out.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            workflows:
              - '.github/workflows/**'

      - name: Set up JDK 21 (Temurin)
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Quality gate before the (slower) test job: fails fast on
      # formatting drift instead of waiting for Testcontainers to spin up.
      - name: Code quality (Spotless formatting check)
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: backend
        run: ./mvnw --batch-mode spotless:check

  quality-frontend:
    name: Code Quality (Frontend)
    runs-on: ubuntu-latest
    steps:
      # paths-filter resolves the diff via local git on push events (the
      # checkout-free API mode only works for pull_request), so it needs
      # the repository checked out.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

      - name: Set up Bun
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Quality gate before the test job: angular-eslint (ng lint).
      - name: Code quality (lint)
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: frontend
        run: bun run lint

  test-backend:
    name: Test (Backend)
    needs: quality-backend
    runs-on: ubuntu-latest
    steps:
      # paths-filter resolves the diff via local git on push events (the
      # checkout-free API mode only works for pull_request), so it needs
      # the repository checked out.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            workflows:
              - '.github/workflows/**'

      - name: Set up JDK 21 (Temurin)
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests and build (mvnw verify, incl. Testcontainers)
        if: steps.filter.outputs.backend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: backend
        run: ./mvnw --batch-mode verify

  test-frontend:
    name: Test (Frontend)
    needs: quality-frontend
    runs-on: ubuntu-latest
    steps:
      # paths-filter resolves the diff via local git on push events (the
      # checkout-free API mode only works for pull_request), so it needs
      # the repository checked out.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

      - name: Set up Bun
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run unit tests (headless)
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: frontend
        run: bun run test

      - name: Production build
        if: steps.filter.outputs.frontend == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        working-directory: frontend
        run: bun run build

  build:
    name: Build
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # paths-filter resolves the diff via local git on push events (the
      # checkout-free API mode only works for pull_request), so it needs
      # the repository checked out.
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'backend/**'
              - 'frontend/**'
              - 'docker-compose.yml'
            workflows:
              - '.github/workflows/**'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v4

      - name: Compute lowercase image repository (GHCR requires lowercase)
        if: steps.filter.outputs.docker == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main) backend image
        if: steps.filter.outputs.docker == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Build (and push on main) frontend image
        if: steps.filter.outputs.docker == 'true' || steps.filter.outputs.workflows == 'true' || github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

  # -----------------------------------------------------------------------
  # deploy:
  #   # UNCOMMENT AND CONFIGURE before enabling automatic deployment.
  #   #
  #   # Required secrets (repository or `production` environment secrets):
  #   #   DEPLOY_HOST    - SSH host/IP of the target machine
  #   #   DEPLOY_USER    - SSH user on the target machine
  #   #   DEPLOY_SSH_KEY - private key with access to DEPLOY_USER@DEPLOY_HOST
  #   #   DEPLOY_PORT    - (optional) SSH port, defaults to 22
  #   #
  #   # Assumes the target host already has this repo checked out (or at
  #   # least docker-compose.yml + infra/) at /opt/spring-angular-sso and
